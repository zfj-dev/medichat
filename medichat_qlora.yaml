# MediChat QLoRA 微调配置
# 使用方法: llamafactory-cli train medichat_qlora.yaml

### 模型配置
model_name_or_path: /hy-tmp/medichat/models/models/Qwen--Qwen2-7B-Instruct/snapshots/master
trust_remote_code: true

### 训练方式
stage: sft
do_train: true
finetuning_type: lora
lora_target: all

### 数据集
dataset: medichat_train
dataset_dir: /hy-tmp/medichat/data/training
template: qwen
cutoff_len: 1024
overwrite_cache: true
preprocessing_num_workers: 4

### 输出
output_dir: /hy-tmp/medichat/models/lora-adapter
logging_steps: 10
save_steps: 100
plot_loss: true

### 训练参数
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 0.0002
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: false
fp16: true

### QLoRA 量化
quantization_bit: 4
quantization_method: bitsandbytes
double_quantization: true

### LoRA 参数
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05

### 其他
max_grad_norm: 1.0
gradient_checkpointing: true
overwrite_output_dir: true
